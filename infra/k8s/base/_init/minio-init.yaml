# =============================================================================
# File: minio-init.yaml
# Version: 1
# Path: infra/k8s/base/_init/minio-init.yaml
# Description: One-shot Job creating MinIO buckets + app user with a
#              readwrite policy (R-100-118 v2). Idempotent: existing
#              buckets / users / policy are skipped or updated in place.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: aywizz
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/component: c10
    app.kubernetes.io/part-of: aywizz-platform
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/component: c10
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-01-17T23-25-50Z
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aywizz-config
            - secretRef:
                name: aywizz-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for minio readiness"
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
                sleep 2
              done
              echo "Ensuring buckets"
              for b in orchestrator requirements validation memory; do
                mc mb --ignore-existing "local/$b"
              done
              echo "Ensuring policy ay-app-readwrite"
              cat > /tmp/policy.json <<'POLICY'
              {
                "Version": "2012-10-17",
                "Statement": [
                  { "Effect": "Allow",
                    "Action": ["s3:*"],
                    "Resource": [
                      "arn:aws:s3:::orchestrator", "arn:aws:s3:::orchestrator/*",
                      "arn:aws:s3:::requirements", "arn:aws:s3:::requirements/*",
                      "arn:aws:s3:::validation",   "arn:aws:s3:::validation/*",
                      "arn:aws:s3:::memory",       "arn:aws:s3:::memory/*"
                    ]
                  }
                ]
              }
              POLICY
              mc admin policy create local ay-app-readwrite /tmp/policy.json || true
              echo "Ensuring app user $MINIO_ACCESS_KEY"
              mc admin user add local "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" || \
                mc admin user svcacct edit local "$MINIO_ACCESS_KEY" --secret-key "$MINIO_SECRET_KEY" || true
              mc admin policy attach local ay-app-readwrite --user "$MINIO_ACCESS_KEY" || true
              echo "MinIO bootstrap done."
