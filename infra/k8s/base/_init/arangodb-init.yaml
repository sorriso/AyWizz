# =============================================================================
# File: arangodb-init.yaml
# Version: 1
# Path: infra/k8s/base/_init/arangodb-init.yaml
# Description: One-shot Job creating the platform ArangoDB database +
#              the dedicated app user (R-100-012 v3, R-100-118 v2).
#              Idempotent: re-runs skip already-present DB / user.
#
#              The Job's `_key` is suffixed at apply-time by Kustomize
#              `nameSuffix` so re-running `kubectl apply` picks up a new
#              Job rather than failing on the immutable pod spec.
#              Alternative: delete the Job before re-apply.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: arangodb-init
  namespace: aywizz
  labels:
    app.kubernetes.io/name: arangodb-init
    app.kubernetes.io/component: c11
    app.kubernetes.io/part-of: aywizz-platform
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arangodb-init
        app.kubernetes.io/component: c11
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: arangosh
          image: arangodb/arangodb:3.12
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aywizz-config
            - secretRef:
                name: aywizz-secrets
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for arangodb endpoint"
              until arangosh \
                --server.endpoint tcp://arangodb:8529 \
                --server.username "$ARANGO_ROOT_USERNAME" \
                --server.password "$ARANGO_ROOT_PASSWORD" \
                --javascript.execute-string 'db._version()' \
                >/dev/null 2>&1; do
                sleep 2
              done
              echo "Ensuring database $ARANGO_DB"
              arangosh \
                --server.endpoint tcp://arangodb:8529 \
                --server.username "$ARANGO_ROOT_USERNAME" \
                --server.password "$ARANGO_ROOT_PASSWORD" \
                --javascript.execute-string "if (!db._databases().includes('$ARANGO_DB')) { db._createDatabase('$ARANGO_DB'); print('created $ARANGO_DB'); } else { print('exists $ARANGO_DB'); }"
              echo "Ensuring app user $ARANGO_USERNAME with rw on $ARANGO_DB"
              arangosh \
                --server.endpoint tcp://arangodb:8529 \
                --server.username "$ARANGO_ROOT_USERNAME" \
                --server.password "$ARANGO_ROOT_PASSWORD" \
                --javascript.execute-string "var users = require('@arangodb/users'); if (!users.exists('$ARANGO_USERNAME')) { users.save('$ARANGO_USERNAME', '$ARANGO_PASSWORD'); print('created user $ARANGO_USERNAME'); } else { users.update('$ARANGO_USERNAME', '$ARANGO_PASSWORD'); print('updated password'); } users.grantDatabase('$ARANGO_USERNAME', '$ARANGO_DB', 'rw'); users.grantCollection('$ARANGO_USERNAME', '$ARANGO_DB', '*', 'rw'); print('granted rw on $ARANGO_DB.* to $ARANGO_USERNAME');"
              echo "Arango bootstrap done."
