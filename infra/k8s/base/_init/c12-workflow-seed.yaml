# =============================================================================
# File: c12-workflow-seed.yaml
# Version: 1
# Path: infra/k8s/base/_init/c12-workflow-seed.yaml
# Description: One-shot Job importing every workflow JSON under the
#              c12-workflow-files ConfigMap into the running n8n.
#              Idempotent: re-imports update workflows in place.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: c12-workflow-seed
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c12-workflow-seed
    app.kubernetes.io/component: c12
    app.kubernetes.io/part-of: aywizz-platform
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c12-workflow-seed
        app.kubernetes.io/component: c12
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: n8n-import
          image: n8nio/n8n:1.74.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_TYPE
              value: "sqlite"
            - name: DB_SQLITE_DATABASE
              value: "/home/node/.n8n/database.sqlite"
            - name: N8N_PORT
              value: "5678"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
            - name: workflows
              mountPath: /workflows
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for c12-workflow readiness"
              until wget --spider -q http://c12-workflow.aywizz.svc.cluster.local:5678/healthz 2>/dev/null; do
                sleep 2
              done
              echo "Importing n8n workflows from /workflows"
              n8n import:workflow --separate --input=/workflows
              echo "Activating imported workflows"
              n8n update:workflow --all --active=true || true
              echo "Seeding done."
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: c12-data
        - name: workflows
          configMap:
            name: c12-workflow-files
            optional: true
