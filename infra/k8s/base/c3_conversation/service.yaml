apiVersion: v1
kind: Service
metadata:
  name: c3-conversation
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c3-conversation
    app.kubernetes.io/component: c3
    app.kubernetes.io/part-of: aywizz-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: c3-conversation
    app.kubernetes.io/component: c3
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
