# =============================================================================
# File: deployment.yaml
# Version: 1
# Path: infra/k8s/base/c6_validation/deployment.yaml
# Description: C6 Validation Pipeline Deployment. Shared `aywizz-api`
#              image, runtime selected via `COMPONENT_MODULE=c6_validation`.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c6-validation
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c6-validation
    app.kubernetes.io/component: c6
    app.kubernetes.io/part-of: aywizz-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c6-validation
      app.kubernetes.io/component: c6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c6-validation
        app.kubernetes.io/component: c6
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: api
          image: ghcr.io/sorriso/aywizz-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: COMPONENT_MODULE
              value: c6_validation
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: aywizz-config
            - secretRef:
                name: aywizz-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "400m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
