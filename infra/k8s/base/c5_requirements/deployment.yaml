# =============================================================================
# File: deployment.yaml
# Version: 1
# Path: infra/k8s/base/c5_requirements/deployment.yaml
# Description: C5 Requirements Service Deployment. Shared `aywizz-api`
#              image, runtime selected via `COMPONENT_MODULE=c5_requirements`.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c5-requirements
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c5-requirements
    app.kubernetes.io/component: c5
    app.kubernetes.io/part-of: aywizz-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c5-requirements
      app.kubernetes.io/component: c5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c5-requirements
        app.kubernetes.io/component: c5
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: api
          image: ghcr.io/sorriso/aywizz-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: COMPONENT_MODULE
              value: c5_requirements
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: aywizz-config
            - secretRef:
                name: aywizz-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "400m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
