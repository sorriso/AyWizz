# =============================================================================
# File: deployment.yaml
# Version: 1
# Path: infra/k8s/base/c2_auth/deployment.yaml
# Description: C2 Auth Service Deployment. One of N pods running the
#              shared `aywizz-api` image, differentiated only by the
#              `COMPONENT_MODULE` env var (R-100-114 v2 + R-100-117).
#              All other config (Arango, MinIO, JWT) flows from the
#              ConfigMap + Secret generated by Kustomize from the
#              overlay's `.env`.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2-auth
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c2-auth
    app.kubernetes.io/component: c2
    app.kubernetes.io/part-of: aywizz-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c2-auth
      app.kubernetes.io/component: c2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c2-auth
        app.kubernetes.io/component: c2
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: api
          image: ghcr.io/sorriso/aywizz-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: COMPONENT_MODULE
              value: c2_auth
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: aywizz-config
            - secretRef:
                name: aywizz-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "400m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
