# =============================================================================
# File: service.yaml
# Version: 1
# Path: infra/k8s/base/c2_auth/service.yaml
# Description: ClusterIP Service for C2 Auth. C1 Traefik IngressRoute
#              targets `c2-auth:8000` for /auth/* routes.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: c2-auth
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c2-auth
    app.kubernetes.io/component: c2
    app.kubernetes.io/part-of: aywizz-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: c2-auth
    app.kubernetes.io/component: c2
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
