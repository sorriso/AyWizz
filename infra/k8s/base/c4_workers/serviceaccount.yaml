# =============================================================================
# File: serviceaccount.yaml
# Version: 1
# Path: infra/k8s/base/c4_workers/serviceaccount.yaml
# Description: Identities for the C4 sub-agent dispatch system.
#                - `c4-sub-agent` (in `c4-workers`) : the SA assigned to
#                  every sub-agent Pod. Holds NO permissions ; the pod
#                  doesn't talk to the K8s API. `automountServiceAccountToken=false`
#                  is set on the pod spec anyway (defense in depth).
#                - `c4-orchestrator` (in `aywizz`) : the SA the
#                  orchestrator Deployment runs as. Granted permissions
#                  on Pods in `c4-workers` via the RoleBinding in
#                  rbac.yaml so it can create / watch / delete pods.
#
# @relation implements:R-200-030
# @relation implements:R-200-031
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: c4-sub-agent
  namespace: c4-workers
  labels:
    app.kubernetes.io/name: c4-sub-agent
    app.kubernetes.io/part-of: aywizz-platform
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: c4-orchestrator
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c4-orchestrator
    app.kubernetes.io/part-of: aywizz-platform
