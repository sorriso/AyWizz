# =============================================================================
# File: rbac.yaml
# Version: 1
# Path: infra/k8s/base/c4_workers/rbac.yaml
# Description: Cross-namespace RBAC for the C4 sub-agent dispatcher
#              (R-200-030). Grants the orchestrator SA (`c4-orchestrator`
#              in `aywizz`) the rights it needs against Pods in the
#              `c4-workers` namespace : create, get, list, watch, delete.
#              Nothing else — no pod/exec, no logs, no port-forward.
#
#              Narrow Role scope intentional : the orchestrator drives
#              the Pod lifecycle (R-200-030/032) but DOES NOT read pod
#              stdout (the sub-agent writes its completion to MinIO per
#              R-200-033). If a future debug surface needs pod/log, it
#              SHALL be a separate Role attached to a separate operator
#              SA — not the orchestrator's.
#
# @relation implements:R-200-030
# @relation implements:R-200-032
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: c4-sub-agent-manager
  namespace: c4-workers
  labels:
    app.kubernetes.io/name: c4-sub-agent-manager
    app.kubernetes.io/part-of: aywizz-platform
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: c4-orchestrator-can-manage-sub-agents
  namespace: c4-workers
  labels:
    app.kubernetes.io/name: c4-orchestrator-can-manage-sub-agents
    app.kubernetes.io/part-of: aywizz-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: c4-sub-agent-manager
subjects:
  - kind: ServiceAccount
    name: c4-orchestrator
    namespace: aywizz
