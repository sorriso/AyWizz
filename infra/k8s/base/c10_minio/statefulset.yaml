# =============================================================================
# File: statefulset.yaml
# Version: 1
# Path: infra/k8s/base/c10_minio/statefulset.yaml
# Description: MinIO single-node StatefulSet (C10). v1 ships single-node;
#              distributed-mode (4+ nodes) deferred until storage scale
#              demands it. Console exposed on 9001 cluster-internal only —
#              never published via Ingress.
#
#              Default storage class is used (50 Gi). Overlays pin the
#              storageClassName explicitly for production.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: aywizz
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: c10
    app.kubernetes.io/part-of: aywizz-platform
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/component: c10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: c10
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-01-20T14-49-07Z
          imagePullPolicy: IfNotPresent
          args:
            - "server"
            - "/data"
            - "--console-address"
            - ":9001"
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aywizz-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aywizz-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
