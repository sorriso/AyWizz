# =============================================================================
# File: middlewares.yaml
# Version: 1
# Path: infra/k8s/base/c1_gateway/middlewares.yaml
# Description: Traefik Middleware CRDs — K8s mirror of
#              `infra/c1_gateway/dynamic/middlewares.yml` (the file
#              provider config used in compose). Three middlewares:
#                - rate-limit-auth   : R-100-039 brute-force protection.
#                - forward-auth-c2   : JWT validation via C2 /auth/verify.
#                - secure-headers    : defensive HTTP headers.
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-auth
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
spec:
  rateLimit:
    average: 10
    burst: 5
    period: 1m
    sourceCriterion:
      ipStrategy:
        depth: 1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth-c2
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
spec:
  forwardAuth:
    address: http://c2-auth.aywizz.svc.cluster.local:8000/auth/verify
    authResponseHeaders:
      - X-User-Id
      - X-User-Roles
      - X-Platform-Auth-Mode
      - X-Tenant-Id
    trustForwardHeader: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c1-gateway
    app.kubernetes.io/component: c1
    app.kubernetes.io/part-of: aywizz-platform
spec:
  headers:
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    customResponseHeaders:
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
