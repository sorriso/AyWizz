# =============================================================================
# File: deployment.yaml
# Version: 1
# Path: infra/k8s/base/c12_workflow/deployment.yaml
# Description: C12 Workflow Engine (n8n) Deployment. Off-the-shelf
#              `n8nio/n8n:1.74.0` image. SQLite DB on PVC. Workflows
#              imported via the c12-workflow-seed Job (in _init/).
#
#              Public webhook endpoints under `/uploads/*` (per
#              R-100-080..088); routed to this service by C1 Traefik
#              IngressRoute.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c12-workflow
  namespace: aywizz
  labels:
    app.kubernetes.io/name: c12-workflow
    app.kubernetes.io/component: c12
    app.kubernetes.io/part-of: aywizz-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: c12-workflow
      app.kubernetes.io/component: c12
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c12-workflow
        app.kubernetes.io/component: c12
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:1.74.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: N8N_PORT
              value: "5678"
            - name: N8N_ENDPOINT_WEBHOOK
              value: "uploads"
            - name: N8N_ENDPOINT_WEBHOOK_TEST
              value: "uploads-test"
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: DB_TYPE
              value: "sqlite"
            - name: DB_SQLITE_DATABASE
              value: "/home/node/.n8n/database.sqlite"
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: N8N_PERSONALIZATION_ENABLED
              value: "false"
            - name: WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: aywizz-config
                  key: PUBLIC_BASE_URL
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
            - name: workflows
              mountPath: /workflows
              readOnly: true
          # First boot runs SQLite migrations (60-90s); start_period
          # mirrors compose v6.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "500m"
              memory: "1024Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: c12-data
        - name: workflows
          configMap:
            # Workflows shipped as a ConfigMap rather than baked into
            # the image — same source files (`infra/c12_workflow/
            # workflows/`) consumed by both compose and K8s. The
            # ConfigMap is generated by Kustomize from the overlay's
            # configMapGenerator (see overlays/dev/kustomization.yaml).
            name: c12-workflow-files
            optional: true
