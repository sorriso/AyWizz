# =============================================================================
# File: deployment.yaml
# Version: 1
# Path: infra/k8s/base/ollama/deployment.yaml
# Description: Ollama embeddings provider — production C7 default
#              (`C7_EMBEDDING_ADAPTER=ollama`, `all-minilm` model). Single
#              replica with model cache on a persistent volume so the
#              ~46 MB model is downloaded once. CPU inference; no GPU
#              support requested in v1.
#
#              Resource budget mirrors docker-compose v6: limit
#              2.0 vCPU / 2 GB, reserve 0.5 / 1 GB.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: aywizz
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ollama
    app.kubernetes.io/part-of: aywizz-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: ollama
        app.kubernetes.io/part-of: aywizz-platform
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.5.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: ollama
              containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          # `curl` not present in image; `ollama list` is the canonical
          # liveness check (mirrors docker-compose v6).
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ollama list >/dev/null 2>&1"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 40
          livenessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "2000m"
              memory: "2048Mi"
            requests:
              cpu: "500m"
              memory: "1024Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
