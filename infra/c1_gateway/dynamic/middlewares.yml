# =============================================================================
# File: middlewares.yml
# Version: 1
# Path: infra/c1_gateway/dynamic/middlewares.yml
# Description: Traefik middleware definitions.
#   - rate-limit-auth   : brute-force protection on /auth/login + /auth/token
#   - forward-auth-c2   : JWT validation via C2 /auth/verify
#   - secure-headers    : HTTP security headers for all responses
#   - auth-mode-header  : propagates X-Platform-Auth-Mode from C2 verify (R-100-033 stub)
# @relation R-100-039 R-100-042 R-100-033
# =============================================================================

http:
  middlewares:

    # -------------------------------------------------------------------------
    # R-100-039: 10 req/min per source IP on authentication endpoints.
    # burst=5 allows short legitimate spikes without triggering the limit.
    # -------------------------------------------------------------------------
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 5
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # -------------------------------------------------------------------------
    # JWT validation delegated to C2 /auth/verify.
    # On 200: Traefik forwards authResponseHeaders downstream.
    # On non-200: Traefik returns 401 to the client without calling the backend.
    # C2 MUST set X-User-Id, X-User-Roles, X-Platform-Auth-Mode as response
    # headers in /auth/verify for downstream components to consume them.
    # -------------------------------------------------------------------------
    forward-auth-c2:
      forwardAuth:
        address: "http://c2:8000/auth/verify"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Roles"
          - "X-Platform-Auth-Mode"
        trustForwardHeader: false

    # -------------------------------------------------------------------------
    # Defensive HTTP headers applied to all authenticated routes.
    # -------------------------------------------------------------------------
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains"
