# Version: 1
# Path: .github/workflows/ci-tests.yml
#
# CI - run unit / contract / integration tests + coherence checks on every
# push to main. Surfaces pass/fail status and line-coverage percentage on
# the GitHub Actions UI (job summary) and exposes both as README badges.
#
# Coverage gate (--cov-fail-under=80) is enforced by ay_platform_core's
# pyproject.toml; this workflow does NOT re-encode the threshold.
#
# @relation implements:R-100-123

name: ci-tests

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: ay_platform_core/pyproject.toml

      - name: Install ay_platform_core (editable, all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "ay_platform_core[all]"

      - name: Run test suite via wrapper
        # Wrapper produces ay_platform_core/reports/<ts>_ci/ and updates
        # the 'latest' symlink. Coverage gate is enforced by pyproject.
        run: bash ay_platform_core/scripts/run_tests.sh ci

      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          set -e
          report=ay_platform_core/reports/latest/coverage.xml
          if [ ! -f "$report" ]; then
            echo "coverage.xml not found at $report" >&2
            echo "line_rate=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          line_rate=$(python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("ay_platform_core/reports/latest/coverage.xml").getroot()
          print(f"{float(root.attrib['line-rate']) * 100:.2f}")
          PY
          )
          echo "line_rate=${line_rate}" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Test results"
            echo ""
            echo "- Status: **${{ job.status }}**"
            echo "- Line coverage: **${{ steps.coverage.outputs.line_rate }}%** (gate: 80%)"
            echo ""
            if [ -f ay_platform_core/reports/latest/pytest_summary.txt ]; then
              echo "### pytest summary (tail)"
              echo ""
              echo '```'
              tail -n 80 ay_platform_core/reports/latest/pytest_summary.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: ay_platform_core/reports/latest/
          retention-days: 14
          if-no-files-found: warn

      - name: Publish coverage badge to gist
        # Optional: requires one-time setup (see README badges section).
        # - secrets.GIST_SECRET : PAT with 'gist' scope
        # - vars.COVERAGE_GIST_ID : id of an empty gist owned by the PAT user
        # If either is missing the step is skipped silently.
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          steps.coverage.outputs.line_rate != 'unknown'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: aywizz-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.line_rate }}%
          valColorRange: ${{ steps.coverage.outputs.line_rate }}
          minColorRange: 50
          maxColorRange: 90

  coherence:
    name: coherence checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: ay_platform_core/pyproject.toml

      - name: Install ay_platform_core (editable, all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "ay_platform_core[all]"

      - name: Run coherence checks via wrapper
        run: bash ay_platform_core/scripts/run_coherence_checks.sh
